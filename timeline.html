<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Component</title>
    <!-- Tailwind CSS for utility classes used in the HTML wrapper -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sage: { DEFAULT: '#8B9E8D', light: '#C8D5C9', dark: '#5C7A5E', accessible: '#527054' },
                        stone: { warm: '#F5F0EB', medium: '#E8DDD4', deep: '#C4B5A5' },
                        navy: { DEFAULT: '#2C3E50', dark: '#1A252F' },
                        cream: '#FAF7F4',
                        muted: '#7A7068',
                    }
                }
            }
        }
    </script>

    <!-- CSS -->
    <style>
        /* 
         * ==========================================
         * CSS TIMELINE COMPONENT
         * ==========================================
         */

        /* Tailwind cannot express: absolute full-height overlay centered on parent */
        #timeline-spine {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            pointer-events: none;
            z-index: 10;
        }

        /* Muted track — full height background */
        #timeline-track {
            position: absolute;
            inset: 0;
            background: var(--color-stone-deep, #C4B5A5);
            opacity: 0.45;
            border-radius: 9999px;
        }

        /* Sage fill — grows with scroll via JS */
        #timeline-fill {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 0;
            background: var(--color-sage, #8B9E8D);
            border-radius: 9999px;
        }

        /* Dot: centered on the 6px line */
        /* Tailwind cannot express: precise negative-offset centering on a narrow element */
        .timeline-dot {
            position: absolute;
            left: -5px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--color-cream, #FAF7F4);
            border: 2px solid var(--color-stone-deep, #C4B5A5);
            transition: background 0.25s ease, border-color 0.25s ease;
            z-index: 1;
        }

        .timeline-dot.tl-active {
            background: var(--color-sage, #8B9E8D);
            border-color: var(--color-sage, #8B9E8D);
        }

        /* ─────────────────────────────────────────────────────────────
           SECTION ILLUSTRATION ANIMATION
           Triggered by JS when the corresponding timeline dot goes active.
           ───────────────────────────────────────────────────────────── */
        @keyframes svg-float {
            0%, 100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-8px) scale(1.03);
            }
        }

        .section-img-active {
            animation: svg-float 3.5s ease-in-out infinite;
            will-change: transform;
        }

        .accent-active {
            /* Add active styles for cards if needed */
        }
        
    </style>
</head>
<body class="bg-cream">

    <!-- 
      * ==========================================
      * HTML TIMELINE WRAPPER
      * ==========================================
      Example usage: A wrapper element containing the timeline spine and the sections you want to scroll through
    -->
    <div id="timeline-wrapper" class="relative">
        
        <!-- Example Section 1 -->
        <section id="patterns" class="py-32 bg-white min-h-[50vh]">
            <div class="mx-auto max-w-4xl text-center">
                <img src="#" alt="Placeholder" class="mx-auto w-32 h-32 bg-stone-medium rounded-full mb-8">
                <div class="card-accent-l bg-cream p-8 rounded-2xl border border-stone-medium">Content 1</div>
            </div>
        </section>

        <!-- Example Section 2 -->
        <section id="communication" class="py-32 bg-cream min-h-[50vh]">
            <div class="mx-auto max-w-4xl text-center">
                <img src="#" alt="Placeholder" class="mx-auto w-32 h-32 bg-stone-medium rounded-full mb-8">
                <div class="card-accent-r bg-white p-8 rounded-2xl border border-stone-medium">Content 2</div>
            </div>
        </section>

        <!-- Example Section 3 -->
        <section id="crisis" class="py-32 bg-white min-h-[50vh]">
            <div class="mx-auto max-w-4xl text-center">
                <img src="#" alt="Placeholder" class="mx-auto w-32 h-32 bg-stone-medium rounded-full mb-8">
                <div class="card-accent-l bg-cream p-8 rounded-2xl border border-stone-medium">Content 3</div>
            </div>
        </section>

        <!-- Example Section 4 -->
        <section id="therapy" class="py-32 bg-cream min-h-[50vh]">
            <div class="mx-auto max-w-4xl text-center">
                <img src="#" alt="Placeholder" class="mx-auto w-32 h-32 bg-stone-medium rounded-full mb-8">
                <div class="card-accent-r bg-white p-8 rounded-2xl border border-stone-medium">Content 4</div>
            </div>
        </section>

        <!-- Timeline spine: desktop only, purely additive -->
        <!-- Note: This expects an ID matching #timeline-spine -->
        <div id="timeline-spine" class="hidden lg:block" aria-hidden="true">
            <div id="timeline-track"></div>
            <div id="timeline-fill"></div>
            <!-- One dot per section -->
            <div class="timeline-dot" data-index="0"></div>
            <div class="timeline-dot" data-index="1"></div>
            <div class="timeline-dot" data-index="2"></div>
            <div class="timeline-dot" data-index="3"></div>
        </div>

    </div><!-- /#timeline-wrapper -->

    <!-- 
      * ==========================================
      * JAVASCRIPT TIMELINE LOGIC
      * ==========================================
    -->
    <script>
        (function () {
            // Only initialize the timeline on desktop screens (>1024px)
            if (!window.matchMedia('(min-width: 1024px)').matches) return;

            const wrapper = document.getElementById('timeline-wrapper');
            const spine = document.getElementById('timeline-spine');
            const fill = document.getElementById('timeline-fill');
            const dots = Array.from(document.querySelectorAll('.timeline-dot'));
            
            // These IDs must match the sections inside the wrapper
            const sectionIds = ['patterns', 'communication', 'crisis', 'therapy'];
            
            // Optional: Elements to animate when their section is active
            const sectionImgs = sectionIds.map(function (id) {
                return document.querySelector('#' + id + ' img');
            });
            const sectionCards = sectionIds.map(function (id) {
                return document.querySelector('#' + id + ' .card-accent-l, #' + id + ' .card-accent-r');
            });

            function positionSpine() {
                const wBase = wrapper.getBoundingClientRect().top + window.scrollY;
                
                // Get the center vertical position of each section
                const dotPositions = sectionIds.map(function (id) {
                    const sec = document.getElementById(id);
                    return sec.getBoundingClientRect().top + window.scrollY - wBase + sec.offsetHeight / 2;
                });

                // Set the top of the spine to the first section's dot position
                const spineTop = dotPositions[0];
                // Set the height of the spine to perfectly span from the first dot to the last dot
                const spineHeight = dotPositions[dotPositions.length - 1] - dotPositions[0];

                spine.style.top = spineTop + 'px';
                spine.style.height = spineHeight + 'px';

                // Position dots along the spine natively based on their mapped positions
                dots.forEach(function (dot, i) {
                    dot.style.top = (dotPositions[i] - spineTop) + 'px';
                });
            }

            function update() {
                const wBase = wrapper.getBoundingClientRect().top + window.scrollY;
                const spineTop = parseFloat(spine.style.top) || 0;
                const spineHeight = parseFloat(spine.style.height) || 1;
                // Determine the "anchor" point on screen for triggering active state (currently middle of viewport)
                const anchor = window.scrollY + window.innerHeight * 0.5;

                // Calculate the scroll progress along the spine
                const progress = Math.max(0, Math.min(1, (anchor - wBase - spineTop) / spineHeight));
                // Fill the green line based on progress
                fill.style.height = (progress * spineHeight) + 'px';

                // Activate dots and section animations when past the anchor
                dots.forEach(function (dot, i) {
                    const dotAbsY = wBase + spineTop + (parseFloat(dot.style.top) || 0);
                    const isActive = anchor > dotAbsY;
                    
                    dot.classList.toggle('tl-active', isActive);
                    if (sectionImgs[i]) sectionImgs[i].classList.toggle('section-img-active', isActive);
                    if (sectionCards[i]) sectionCards[i].classList.toggle('accent-active', isActive);
                });
            }

            function init() { 
                positionSpine(); 
                update(); 
            }

            window.addEventListener('scroll', update, { passive: true });
            window.addEventListener('resize', function () { positionSpine(); update(); });
            
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                requestAnimationFrame(init);
            }
        })();
    </script>
</body>
</html>
